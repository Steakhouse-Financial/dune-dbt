name: dbt prod incremental

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 02:00 UTC
  # NOTE: Schedule is disabled by default. Uncomment when ready to enable hourly production runs.
  # Check the README.md to make sure you understand the credit costs associated with running dbt.
  workflow_dispatch:  # Allow manual triggers

concurrency:
  group: dbt-prod-runs  # Shared group with dbt_deploy.yml to prevent concurrent production runs
  cancel-in-progress: false  # Don't cancel in-progress runs, queue instead

jobs:
  dbt-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
      DUNE_TEAM_NAME: ${{ vars.DUNE_TEAM_NAME || 'steakhouse' }}  # Set as GitHub Variable or defaults to 'steakhouse'
      DBT_TARGET: prod  # All dbt commands will use the prod target from profiles.yml

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Install dbt packages
        run: uv run dbt deps

      # ── Credit guard ──────────────────────────────────────────────────────────
      # Checks current Dune credit balance before running. Aborts if remaining
      # credits are below the CREDIT_FLOOR threshold (default 100) to prevent
      # the daily run from draining a low balance unexpectedly.
      # Set CREDIT_FLOOR as a GitHub Variable to adjust the threshold.
      - name: Check Dune credit balance
        env:
          CREDIT_FLOOR: ${{ vars.CREDIT_FLOOR || '100' }}
        run: |
          RESPONSE=$(curl -sf \
            -H "X-DUNE-API-KEY: $DUNE_API_KEY" \
            "https://api.dune.com/api/v1/auth/user")
          REMAINING=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # credits_remaining is under the top-level user object
          print(data.get('credits_remaining', data.get('credits', {}).get('remaining', 'unknown')))
          " 2>/dev/null || echo "unknown")
          echo "Credits remaining: $REMAINING"
          if [ "$REMAINING" != "unknown" ] && [ "$REMAINING" -lt "$CREDIT_FLOOR" ] 2>/dev/null; then
            echo "::error::Aborting: only $REMAINING credits remaining (floor: $CREDIT_FLOOR). Replenish credits or lower CREDIT_FLOOR variable."
            exit 1
          fi

      - name: Run models
        run: uv run dbt run --exclude config.materialized:view # views should only run when modified

      - name: Test models
        run: uv run dbt test --exclude config.materialized:view # views should only be tested when modified
